<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafico SVG</title>
</head>
<body>
    <h1>Gráfico SVG</h1>
<svg width="200" height="200"
    >
    <circle r="40" cx="50" cy="50" fill="yellow" stroke="green" stroke-width="4">
        <animateTransform
            attributeName="transform"
            begin="0s"
            dur="0.5s"
            type="rotate"
            from="0 60 60"
            to="360 60 60"
            repeatCount="indefinite"/>
    </circle>
</svg>
